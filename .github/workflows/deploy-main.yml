# Nasadenie na FTP po pushi do main
#
# Runner: composer + yarn build + optimize:clear (potrebuje lokálny vendor a .env).
# Na FTP sa vendor a .env NENahrávajú — na serveri po deployi spusti:
#   cd …/laravel && composer install --no-dev --optimize-autoloader --no-interaction
#   php artisan migrate --force   # ak nebeží z runnera
#   php artisan config:cache && php artisan route:cache && php artisan view:cache
# .env na produkcii drž mimo FTP (napr. Infisical → súbor na serveri).
#
# === GitHub: Settings → Secrets and variables → Actions ===
#
# Povinné pre tento workflow:
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
#   FTP_PORT (voliteľné, default 21)
#
# Pre krok „Write Laravel .env“ (iba na runneri, neuploaduje sa):
#   APP_KEY, APP_URL
#   ADMIN_EMAIL, ADMIN_PASSWORD  (ak ich .env.example vyžaduje)
#   DB_HOST, DB_PORT, DB_DATABASE, DB_USERNAME, DB_PASSWORD  (ak spúšťaš artisan na runneri)
#
# Pre build Vue na runneri:
#   VITE_API_BASE   (napr. /api alebo https://tvoja-domena.tld/api)
#   VITE_APP_BASE   (voliteľné, default /)
#
# Voliteľné:
#   TOKEN_MIGRATION, TOKEN_CRON
#
# === Na serveri (mimo GitHub) ===
#   • Jednorazovo: v koreni Laravelu vytvor .env (Infisical CLI, manuálne, …).
#   • Po každom deployi z tohto workflow: composer install --no-dev (lebo vendor chýba).
#   • Uprav server-dir nižšie, ak nemáš ./htdocs/ a ./htdocs/laravel/.
#
# Migrácie z runnera (DB musí byť dostupná z internetu):
#   Odkomentuj krok „Run migrations“ a nastav DB_* secrets.
#
name: Deploy main

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG }}
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, fileinfo, pdo, pdo_mysql
          coverage: none
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: vue/yarn.lock

      - name: Build Laravel .env from .env.example
        run: python3 scripts/render-env-from-example.py laravel/.env.example laravel/.env

      - name: Build Vue .env.production from .env.example
        run: python3 scripts/render-env-from-example.py vue/.env.example vue/.env.production

      - name: Composer install (Laravel, len pre runner)
        working-directory: laravel
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Clear Laravel caches
        working-directory: laravel
        run: php artisan optimize:clear

      - name: Yarn install & build (Vue)
        working-directory: vue
        run: yarn install --frozen-lockfile && yarn build

      - name: Prepare Laravel package for upload
        run: |
          rm -rf laravel/vendor
          rm -f laravel/.env
          rm -rf laravel/node_modules
          rm -rf laravel/tests
          rm -f laravel/phpunit.xml
          rm -f laravel/phpunit.xml.dist
          rm -f laravel/.phpunit.result.cache
          rm -f laravel/bootstrap/cache/config.php
          rm -f laravel/bootstrap/cache/routes-*.php

      - name: Copy Vue dist via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          source: "vue/dist/*"
          target: "/home/travian-stats.run.place/public_html/"

      - name: Copy Laravel via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          source: "laravel/*"
          target: "/home/travian-stats.run.place/public_html/laravel/"

      - name: Run post-deploy on server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            cd /home/travian-stats.run.place/public_html/laravel
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache